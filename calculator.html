<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>الحاسبة العلمية</title>
  <meta name="theme-color" content="#0a0a0a">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: #161616;
      --bg-display: #0d0d0d;
      --border: #1e1e1e;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --accent-orange: #f97316;
      --accent-orange-hover: #ea580c;
      --accent-red: #ef4444;
      --accent-green: #22c55e;
      --btn-number: #1e1e1e;
      --btn-number-hover: #2a2a2a;
      --btn-operator: #1a1a2e;
      --btn-operator-hover: #252547;
      --btn-function: #162032;
      --btn-function-hover: #1e2d47;
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .calculator-wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .calculator-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px;
      margin-bottom: 8px;
    }

    .calculator-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .calculator-header h1 span {
      font-size: 1.2rem;
    }

    .mode-toggle {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 6px 14px;
      font-size: 0.75rem;
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .mode-btn.active {
      background: var(--accent-blue);
      color: white;
    }

    .calculator {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), var(--shadow-glow);
    }

    .display {
      background: var(--bg-display);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      overflow: hidden;
    }

    .display-history {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      width: 100%;
      text-align: left;
      direction: ltr;
      overflow-x: auto;
      white-space: nowrap;
      min-height: 22px;
    }

    .display-expression {
      font-size: 1rem;
      color: var(--text-secondary);
      width: 100%;
      text-align: left;
      direction: ltr;
      overflow-x: auto;
      white-space: nowrap;
      min-height: 24px;
      margin-bottom: 4px;
    }

    .display-result {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      width: 100%;
      text-align: left;
      direction: ltr;
      overflow-x: auto;
      white-space: nowrap;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .display-result.error {
      color: var(--accent-red);
      font-size: 1.4rem;
    }

    .memory-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .memory-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      font-weight: 600;
      display: none;
    }

    .memory-badge.visible {
      display: inline-block;
    }

    .btn-grid {
      display: grid;
      gap: 8px;
    }

    .btn-grid.standard {
      grid-template-columns: repeat(4, 1fr);
    }

    .btn-grid.scientific {
      grid-template-columns: repeat(5, 1fr);
    }

    .btn {
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 16px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: inherit;
    }

    .btn:active::after {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: var(--btn-number);
      color: var(--text-primary);
    }

    .btn-number:hover {
      background: var(--btn-number-hover);
    }

    .btn-operator {
      background: var(--btn-operator);
      color: #818cf8;
      font-size: 1.3rem;
    }

    .btn-operator:hover {
      background: var(--btn-operator-hover);
    }

    .btn-function {
      background: var(--btn-function);
      color: #60a5fa;
      font-size: 0.85rem;
    }

    .btn-function:hover {
      background: var(--btn-function-hover);
    }

    .btn-equals {
      background: linear-gradient(135deg, var(--accent-blue), #6366f1);
      color: white;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-equals:hover {
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      filter: brightness(1.1);
    }

    .btn-clear {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
      font-weight: 600;
    }

    .btn-clear:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn-backspace {
      background: rgba(249, 115, 22, 0.12);
      color: var(--accent-orange);
    }

    .btn-backspace:hover {
      background: rgba(249, 115, 22, 0.22);
    }

    .btn-memory {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent-green);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .btn-memory:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .btn-sci {
      background: #1a1528;
      color: #c084fc;
      font-size: 0.8rem;
      padding: 12px 6px;
    }

    .btn-sci:hover {
      background: #251d3a;
    }

    .btn-span-2 {
      grid-column: span 2;
    }

    .history-panel {
      margin-top: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    .history-panel.open {
      max-height: 300px;
      padding: 12px 0;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .history-header span {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .history-clear-btn {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-clear-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .history-list {
      max-height: 200px;
      overflow-y: auto;
      padding: 0 12px;
    }

    .history-item {
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      direction: ltr;
      text-align: left;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .history-item .expr {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .history-item .result {
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .history-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px;
      border-radius: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.8rem;
      color: var(--text-muted);
      width: 100%;
    }

    .history-toggle:hover {
      background: var(--btn-number);
      color: var(--text-secondary);
    }

    .keyboard-hint {
      text-align: center;
      margin-top: 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .calculator { padding: 14px; border-radius: 16px; }
      .display { padding: 16px 18px; min-height: 100px; border-radius: 12px; }
      .display-result { font-size: 2rem; }
      .btn { padding: 14px 6px; border-radius: 12px; font-size: 1rem; }
      .btn-operator { font-size: 1.2rem; }
      .btn-sci { font-size: 0.7rem; padding: 10px 4px; }
    }

    @media (max-height: 700px) {
      .btn { padding: 12px 6px; }
      .display { min-height: 90px; padding: 14px 18px; }
    }
  </style>
</head>

<body>
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <h1><span>🔢</span> الحاسبة</h1>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('standard')" id="modeStandard">عادية</button>
        <button class="mode-btn" onclick="setMode('scientific')" id="modeScientific">علمية</button>
      </div>
    </div>

    <div class="calculator">
      <div class="display">
        <div class="memory-indicator">
          <span class="memory-badge" id="memBadge">M</span>
        </div>
        <div class="display-history" id="displayHistory"></div>
        <div class="display-expression" id="displayExpression"></div>
        <div class="display-result" id="displayResult">0</div>
      </div>

      <!-- Standard Mode -->
      <div class="btn-grid standard" id="standardGrid">
        <button class="btn btn-clear" onclick="clearAll()">AC</button>
        <button class="btn btn-backspace" onclick="backspace()">⌫</button>
        <button class="btn btn-function" onclick="inputPercent()">%</button>
        <button class="btn btn-operator" onclick="inputOperator('/')">÷</button>

        <button class="btn btn-number" onclick="inputNumber('7')">7</button>
        <button class="btn btn-number" onclick="inputNumber('8')">8</button>
        <button class="btn btn-number" onclick="inputNumber('9')">9</button>
        <button class="btn btn-operator" onclick="inputOperator('*')">×</button>

        <button class="btn btn-number" onclick="inputNumber('4')">4</button>
        <button class="btn btn-number" onclick="inputNumber('5')">5</button>
        <button class="btn btn-number" onclick="inputNumber('6')">6</button>
        <button class="btn btn-operator" onclick="inputOperator('-')">−</button>

        <button class="btn btn-number" onclick="inputNumber('1')">1</button>
        <button class="btn btn-number" onclick="inputNumber('2')">2</button>
        <button class="btn btn-number" onclick="inputNumber('3')">3</button>
        <button class="btn btn-operator" onclick="inputOperator('+')">+</button>

        <button class="btn btn-function" onclick="toggleSign()">±</button>
        <button class="btn btn-number" onclick="inputNumber('0')">0</button>
        <button class="btn btn-number" onclick="inputDecimal()">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>
      </div>

      <!-- Scientific Mode -->
      <div class="btn-grid scientific" id="scientificGrid" style="display:none;">
        <button class="btn btn-sci" onclick="sciFunc('sin')">sin</button>
        <button class="btn btn-sci" onclick="sciFunc('cos')">cos</button>
        <button class="btn btn-sci" onclick="sciFunc('tan')">tan</button>
        <button class="btn btn-clear" onclick="clearAll()">AC</button>
        <button class="btn btn-backspace" onclick="backspace()">⌫</button>

        <button class="btn btn-sci" onclick="sciFunc('asin')">sin⁻¹</button>
        <button class="btn btn-sci" onclick="sciFunc('acos')">cos⁻¹</button>
        <button class="btn btn-sci" onclick="sciFunc('atan')">tan⁻¹</button>
        <button class="btn btn-function" onclick="inputPercent()">%</button>
        <button class="btn btn-operator" onclick="inputOperator('/')">÷</button>

        <button class="btn btn-sci" onclick="sciFunc('log')">log</button>
        <button class="btn btn-sci" onclick="sciFunc('ln')">ln</button>
        <button class="btn btn-sci" onclick="sciFunc('sqrt')">√</button>
        <button class="btn btn-sci" onclick="inputOperator('^')">xʸ</button>
        <button class="btn btn-sci" onclick="sciFunc('factorial')">n!</button>

        <button class="btn btn-sci" onclick="inputPi()">π</button>
        <button class="btn btn-sci" onclick="inputE()">e</button>
        <button class="btn btn-sci" onclick="inputParenthesis('(')">(</button>
        <button class="btn btn-sci" onclick="inputParenthesis(')')">)</button>
        <button class="btn btn-operator" onclick="inputOperator('*')">×</button>

        <button class="btn btn-number" onclick="inputNumber('7')">7</button>
        <button class="btn btn-number" onclick="inputNumber('8')">8</button>
        <button class="btn btn-number" onclick="inputNumber('9')">9</button>
        <button class="btn btn-operator" onclick="inputOperator('-')">−</button>
        <button class="btn btn-memory" onclick="memoryStore()">MS</button>

        <button class="btn btn-number" onclick="inputNumber('4')">4</button>
        <button class="btn btn-number" onclick="inputNumber('5')">5</button>
        <button class="btn btn-number" onclick="inputNumber('6')">6</button>
        <button class="btn btn-operator" onclick="inputOperator('+')">+</button>
        <button class="btn btn-memory" onclick="memoryRecall()">MR</button>

        <button class="btn btn-number" onclick="inputNumber('1')">1</button>
        <button class="btn btn-number" onclick="inputNumber('2')">2</button>
        <button class="btn btn-number" onclick="inputNumber('3')">3</button>
        <button class="btn btn-function" onclick="toggleSign()">±</button>
        <button class="btn btn-memory" onclick="memoryClear()">MC</button>

        <button class="btn btn-number btn-span-2" onclick="inputNumber('0')">0</button>
        <button class="btn btn-number" onclick="inputDecimal()">.</button>
        <button class="btn btn-equals btn-span-2" onclick="calculate()">=</button>
      </div>
    </div>

    <button class="history-toggle" onclick="toggleHistory()" id="historyToggle">
      📋 سجل العمليات
    </button>

    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <span>السجل</span>
        <button class="history-clear-btn" onclick="clearHistory()">مسح الكل</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="keyboard-hint" id="keyboardHint">⌨️ يمكنك استخدام لوحة المفاتيح للإدخال</div>
  </div>

  <script>
    const state = {
      expression: '',
      result: '0',
      lastResult: null,
      newInput: true,
      memory: 0,
      hasMemory: false,
      history: [],
      mode: 'standard',
      openParentheses: 0
    };

    const displayResult = document.getElementById('displayResult');
    const displayExpression = document.getElementById('displayExpression');
    const displayHistory = document.getElementById('displayHistory');
    const memBadge = document.getElementById('memBadge');

    function updateDisplay() {
      displayResult.textContent = state.result;
      displayResult.className = 'display-result';
      displayExpression.textContent = formatExpression(state.expression);
      memBadge.classList.toggle('visible', state.hasMemory);

      const len = state.result.length;
      if (len > 14) displayResult.style.fontSize = '1.4rem';
      else if (len > 10) displayResult.style.fontSize = '1.8rem';
      else displayResult.style.fontSize = '';
    }

    function formatExpression(expr) {
      return expr
        .replace(/\*/g, ' × ')
        .replace(/\//g, ' ÷ ')
        .replace(/\+/g, ' + ')
        .replace(/-/g, ' − ')
        .replace(/\^/g, ' ^ ');
    }

    function formatNumber(num) {
      if (typeof num === 'string' && (num.includes('Error') || num === 'Infinity' || num === '-Infinity' || num === 'NaN')) {
        return 'خطأ';
      }
      const n = parseFloat(num);
      if (isNaN(n)) return 'خطأ';
      if (Number.isInteger(n) && Math.abs(n) < 1e15) return n.toLocaleString('en-US');
      if (Math.abs(n) >= 1e15 || (Math.abs(n) < 0.0001 && n !== 0)) return n.toExponential(6);
      const fixed = parseFloat(n.toPrecision(12));
      return fixed.toLocaleString('en-US', { maximumFractionDigits: 10 });
    }

    function inputNumber(num) {
      if (state.newInput) {
        state.result = num;
        state.newInput = false;
      } else {
        if (state.result === '0' && num !== '0') {
          state.result = num;
        } else if (state.result === '0' && num === '0') {
          return;
        } else {
          state.result += num;
        }
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (state.newInput) {
        state.result = '0.';
        state.newInput = false;
      } else if (!state.result.includes('.')) {
        state.result += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      if (state.expression && state.newInput && !state.lastResult) {
        state.expression = state.expression.slice(0, -1) + op;
      } else {
        state.expression += state.result + op;
        state.lastResult = null;
      }
      state.newInput = true;
      updateDisplay();
    }

    function inputPercent() {
      const current = parseFloat(state.result);
      if (isNaN(current)) return;
      state.result = formatNumber(current / 100);
      state.newInput = true;
      updateDisplay();
    }

    function toggleSign() {
      if (state.result === '0') return;
      if (state.result.startsWith('-')) {
        state.result = state.result.slice(1);
      } else {
        state.result = '-' + state.result;
      }
      updateDisplay();
    }

    function backspace() {
      if (state.newInput || state.result.length <= 1 || (state.result.length === 2 && state.result.startsWith('-'))) {
        state.result = '0';
        state.newInput = true;
      } else {
        state.result = state.result.slice(0, -1);
      }
      updateDisplay();
    }

    function clearAll() {
      state.expression = '';
      state.result = '0';
      state.lastResult = null;
      state.newInput = true;
      state.openParentheses = 0;
      displayHistory.textContent = '';
      updateDisplay();
    }

    function inputParenthesis(p) {
      if (p === '(') {
        if (state.newInput) {
          state.expression += '(';
        } else {
          state.expression += state.result + '*(';
          state.newInput = true;
        }
        state.openParentheses++;
      } else if (p === ')' && state.openParentheses > 0) {
        state.expression += state.result + ')';
        state.openParentheses--;
        state.newInput = true;
      }
      updateDisplay();
    }

    function inputPi() {
      state.result = Math.PI.toString();
      state.newInput = false;
      updateDisplay();
    }

    function inputE() {
      state.result = Math.E.toString();
      state.newInput = false;
      updateDisplay();
    }

    function factorial(n) {
      if (n < 0) return NaN;
      if (n === 0 || n === 1) return 1;
      if (n > 170) return Infinity;
      if (!Number.isInteger(n)) return gamma(n + 1);
      let result = 1;
      for (let i = 2; i <= n; i++) result *= i;
      return result;
    }

    function gamma(z) {
      if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
      z -= 1;
      const g = 7;
      const c = [
        0.99999999999980993, 676.5203681218851, -1259.1392167224028,
        771.32342877765313, -176.61502916214059, 12.507343278686905,
        -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
      ];
      let x = c[0];
      for (let i = 1; i < g + 2; i++) x += c[i] / (z + i);
      const t = z + g + 0.5;
      return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
    }

    function sciFunc(fn) {
      const current = parseFloat(state.result);
      if (isNaN(current)) {
        showError(); return;
      }
      let res;
      const fnDisplay = {
        'sin': 'sin', 'cos': 'cos', 'tan': 'tan',
        'asin': 'sin⁻¹', 'acos': 'cos⁻¹', 'atan': 'tan⁻¹',
        'log': 'log', 'ln': 'ln', 'sqrt': '√', 'factorial': '!'
      };
      switch (fn) {
        case 'sin': res = Math.sin(current * Math.PI / 180); break;
        case 'cos': res = Math.cos(current * Math.PI / 180); break;
        case 'tan':
          if (Math.abs(current % 180) === 90) { showError(); return; }
          res = Math.tan(current * Math.PI / 180); break;
        case 'asin':
          if (current < -1 || current > 1) { showError(); return; }
          res = Math.asin(current) * 180 / Math.PI; break;
        case 'acos':
          if (current < -1 || current > 1) { showError(); return; }
          res = Math.acos(current) * 180 / Math.PI; break;
        case 'atan': res = Math.atan(current) * 180 / Math.PI; break;
        case 'log':
          if (current <= 0) { showError(); return; }
          res = Math.log10(current); break;
        case 'ln':
          if (current <= 0) { showError(); return; }
          res = Math.log(current); break;
        case 'sqrt':
          if (current < 0) { showError(); return; }
          res = Math.sqrt(current); break;
        case 'factorial':
          if (current < 0 || current > 170) { showError(); return; }
          res = factorial(current); break;
        default: return;
      }

      if (fn === 'factorial') {
        displayHistory.textContent = `${state.result}! = ${formatNumber(res)}`;
      } else {
        displayHistory.textContent = `${fnDisplay[fn]}(${state.result}) = ${formatNumber(res)}`;
      }
      state.result = formatNumber(res);
      state.newInput = true;
      state.expression = '';
      updateDisplay();
    }

    function calculate() {
      let expr = state.expression + state.result;
      while (state.openParentheses > 0) {
        expr += ')';
        state.openParentheses--;
      }

      if (!expr.trim()) return;

      try {
        const safeExpr = expr.replace(/\^/g, '**');
        const sanitized = safeExpr.replace(/[^0-9+\-*/().eE **]/g, '');
        if (!sanitized.trim()) { showError(); return; }
        const result = Function('"use strict"; return (' + sanitized + ')')();
        if (!isFinite(result) && result !== Infinity && result !== -Infinity) {
          showError(); return;
        }

        const formatted = formatNumber(result);
        displayHistory.textContent = formatExpression(expr) + ' =';

        addToHistory(expr, formatted);

        state.result = formatted;
        state.expression = '';
        state.newInput = true;
        state.lastResult = result;
        updateDisplay();
      } catch {
        showError();
      }
    }

    function showError() {
      state.result = 'خطأ';
      displayResult.className = 'display-result error';
      displayResult.textContent = 'خطأ';
      state.expression = '';
      state.newInput = true;
    }

    function memoryStore() {
      const val = parseFloat(state.result);
      if (!isNaN(val)) {
        state.memory = val;
        state.hasMemory = true;
        updateDisplay();
      }
    }

    function memoryRecall() {
      if (state.hasMemory) {
        state.result = formatNumber(state.memory);
        state.newInput = false;
        updateDisplay();
      }
    }

    function memoryClear() {
      state.memory = 0;
      state.hasMemory = false;
      updateDisplay();
    }

    function addToHistory(expr, result) {
      state.history.unshift({ expression: expr, result: result });
      if (state.history.length > 50) state.history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = state.history.map((item, i) =>
        `<div class="history-item" onclick="loadHistory(${i})">
          <div class="expr">${formatExpression(item.expression)}</div>
          <div class="result">= ${item.result}</div>
        </div>`
      ).join('');
    }

    function loadHistory(index) {
      const item = state.history[index];
      if (item) {
        state.result = item.result;
        state.newInput = true;
        updateDisplay();
      }
    }

    function clearHistory() {
      state.history = [];
      renderHistory();
    }

    function toggleHistory() {
      const panel = document.getElementById('historyPanel');
      panel.classList.toggle('open');
    }

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('modeStandard').classList.toggle('active', mode === 'standard');
      document.getElementById('modeScientific').classList.toggle('active', mode === 'scientific');
      document.getElementById('standardGrid').style.display = mode === 'standard' ? 'grid' : 'none';
      document.getElementById('scientificGrid').style.display = mode === 'scientific' ? 'grid' : 'none';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === '%') inputPercent();
      else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape' || e.key === 'Delete') clearAll();
      else if (e.key === '(') inputParenthesis('(');
      else if (e.key === ')') inputParenthesis(')');
      else if (e.key === '^') inputOperator('^');
    });

    if ('ontouchstart' in window) {
      document.getElementById('keyboardHint').style.display = 'none';
    }
  </script>
</body>

</html>
